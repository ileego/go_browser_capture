<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34A853;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="56" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Browser window frame -->
  <rect x="24" y="28" width="80" height="60" rx="6" fill="#fff" opacity="0.95"/>
  
  <!-- Browser header -->
  <rect x="24" y="28" width="80" height="16" rx="6" fill="#E8EAED"/>
  <rect x="24" y="36" width="80" height="8" fill="#E8EAED"/>
  
  <!-- Browser dots -->
  <circle cx="32" cy="36" r="3" fill="#EA4335"/>
  <circle cx="42" cy="36" r="3" fill="#FBBC05"/>
  <circle cx="52" cy="36" r="3" fill="#34A853"/>
  
  <!-- URL bar -->
  <rect x="62" y="32" width="36" height="8" rx="4" fill="#fff"/>
  
  <!-- DOM element selector icon -->
  <g transform="translate(44, 52)">
    <!-- Brackets -->
    <path d="M0 8 L0 0 L8 0" stroke="#4285F4" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M32 8 L32 0 L24 0" stroke="#4285F4" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 24 L0 32 L8 32" stroke="#4285F4" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M32 24 L32 32 L24 32" stroke="#4285F4" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Inner content lines -->
    <rect x="10" y="8" width="12" height="3" rx="1.5" fill="#34A853"/>
    <rect x="10" y="14" width="16" height="3" rx="1.5" fill="#FBBC05"/>
    <rect x="10" y="20" width="8" height="3" rx="1.5" fill="#EA4335"/>
  </g>
  
  <!-- Go language gopher hint (small) -->
  <circle cx="96" cy="88" r="8" fill="#00ADD8"/>
  <text x="96" y="92" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold" font-family="Arial">Go</text>
</svg>