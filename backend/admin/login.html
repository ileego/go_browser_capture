<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser DOM Capture - 管理后台</title>
    <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <svg width="48" height="48" viewBox="0 0 128 128" fill="none">
                        <defs>
                            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#3B82F6"/>
                                <stop offset="100%" style="stop-color:#10B981"/>
                            </linearGradient>
                        </defs>
                        <circle cx="64" cy="64" r="56" fill="url(#bgGrad)"/>
                        <rect x="24" y="36" width="80" height="68" rx="8" fill="white"/>
                        <rect x="28" y="40" width="72" height="12" rx="2" fill="#E5E7EB"/>
                        <rect x="32" y="56" width="64" height="24" rx="4" fill="#3B82F6"/>
                        <rect x="36" y="84" width="20" height="8" rx="2" fill="#10B981"/>
                        <rect x="62" y="84" width="20" height="8" rx="2" fill="#F59E0B"/>
                        <rect x="88" y="84" width="20" height="8" rx="2" fill="#EF4444"/>
                        <circle cx="100" cy="28" r="8" fill="#06B6D4"/>
                    </svg>
                </div>
                <h1>Browser DOM Capture</h1>
                <p>智能网页元素抓取系统</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            
            <div id="errorMsg" class="error-message"></div>
        </div>
    </div>
    
    <script src="/admin/js/app.js"></script>
</body>
</html>
